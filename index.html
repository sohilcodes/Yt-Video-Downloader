<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Downloader</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

h1 {
    font-size: 24px;
}

input {
    width: 90%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-top: 20px;
}

button {
    width: 90%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    border: none;
    background: #ef4444;
    color: white;
    font-size: 16px;
}

button:hover {
    background: #dc2626;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎬 YouTube Downloader</h1>

    <form action="/download" method="POST">
        <input type="text" name="url" placeholder="Paste YouTube Link" required>
        <button type="submit">Download</button>
    </form>
</div>

</body>
  </html>
